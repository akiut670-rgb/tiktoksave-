<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Downloader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --input-bg: #1e293b;
            --btn-color: #3b82f6;
            --text-color: #ffffff;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-top: 40px;
        }

        h2 { margin-bottom: 25px; font-size: 22px; font-weight: 600; }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid transparent;
            background-color: var(--input-bg);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--btn-color); }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background-color: var(--btn-color);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { background-color: #2563eb; transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #resultSection {
            display: none;
            margin-top: 20px;
        }
        
        .profile-info {
            background-color: var(--input-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
            font-size: 14px;
        }
        
        .ad-btn {
            background-color: transparent;
            border: 1px solid #475569;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .ad-badge {
            background-color: #475569;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container" id="mainSection">
        <h2>Download TikTok Video</h2>
        <input type="text" id="tiktokLink" placeholder="https://vt.tiktok.com/...">
        <button id="downloadBtn" onclick="processLink()">Download</button>
    </div>

    <div class="container" id="resultSection">
        <div class="profile-info">
            <strong style="color: #94a3b8;">@username</strong><br><br>
            Video title and description will appear here #foryou #trending
        </div>
        
        <button class="ad-btn" id="adDownloadBtn" onclick="showAd()">
            Download video <span class="ad-badge">AD</span>
        </button>
        <button class="ad-btn">Download music</button>
    </div>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.ready();

        function processLink() {
            const link = document.getElementById('tiktokLink').value;
            const btn = document.getElementById('downloadBtn');

            if (!link) {
                tg.showAlert("Please paste a valid TikTok link!");
                return;
            }

            // Show loading state
            btn.innerText = "Loading...";
            btn.style.opacity = "0.7";

            // Simulate backend API processing delay (2 seconds)
            setTimeout(() => {
                document.getElementById('mainSection').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
            }, 2000);
        }

        // Function to handle the Ad display and subsequent download
        function showAd() {
            // Your provided Monetag Direct Link
            const adUrl = "https://www.effectivecpmnetwork.com/m0mifaq4?key=4844cde739311ef0e587e990e3a81d91";
            
            // Safely open the link using Telegram's in-app browser
            tg.openLink(adUrl);

            // Disable the button to prevent multiple clicks and show processing state
            const adBtn = document.getElementById('adDownloadBtn');
            adBtn.innerHTML = "Processing... <span class='ad-badge'>Wait</span>";
            adBtn.disabled = true;

            // Wait for 5 seconds (5000 milliseconds) before enabling the download
            setTimeout(() => {
                // Restore the button to its original state
                adBtn.innerHTML = "Download Ready <span class='ad-badge'>✓</span>";
                adBtn.disabled = false;
                
                // Alert the user and trigger the actual download logic here
                // In a real scenario, you might use tg.sendData("download_ready") to notify your bot
                tg.showAlert("Ad viewed successfully. The video will now start downloading.");
                
            }, 5000); // You can adjust the waiting time here
        }
    </script>
</body>
</html>
